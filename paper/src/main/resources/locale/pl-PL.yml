# Problemy: https://github.com/Crazy-Crew/CrazyEnvoys/issues
# Nowe funkcje: https://github.com/Crazy-Crew/CrazyEnvoys/issues
#
# Rady:
#  1. Upewnij się, że dodajesz {prefix} na początku swoich wiadomości.
#  2. Jeżeli chcesz użyć więcej niż jednej lini użyj list.
# Przykłady:
#   Linia:
#     No-Permission: '{prefix}<red>Nie masz uprawnień, aby użyć tej komendy.'
#   List:
#     No-Permission:
#       - '{prefix}<red>Nie masz uprawnień,'
#       - '<red>aby użyć tej komendy. Spróbuj innej.'
player:
  no-permission: "{prefix}<red>Nie masz uprawnień, aby użyć tej komendy."
  no-permission-to-claim: "{prefix}<red>Nie masz uprawnień, aby otworzyć ten zrzut."
envoys:
  already-started: "{prefix}<red>Wydarzenie zrzutów już jest w trakcie działania. Zatrzymaj je, aby rozpocząć kolejne."
  force-start: "{prefix}<gray>Zacząłeś zrzuty."
  not-started: "{prefix}<red>W tym momencie żadne wydarzenie zrzutów nie jest aktywne."
  force-ended: "{prefix}<red>Zakończyłeś zrzuty."
  warning: "{prefix}<red>[<dark_red>UWAGA<red>] <gray>Wydarzenie zrzutów zacznie się za <gold>{time}."
  started: "{prefix}<gray>Zrzuty właśnie zaczęły spadać. <gold>{amount} <gray>zrzutów spadło i będzie tam leżało przez 5m."
  left: "{prefix}<gold>{player} <gray>znalazł zrzut. Pozostało <gold>{amount} zrzutów"
  ended: "{prefix}<red>Wydarzenie zrzutów właśnie się zakończyło, oczekujcie nowego."
  not-enough-players: "{prefix}<gray>Nie wystarczająco graczy, aby zacząć wydarzenie zrzutów. Tylko <gold>{amount} <gray>jest teraz aktywnych."
  enter-editor-mode: "{prefix}<gray>Wszedłeś w tryb edycji."
  leave-editor-mode: "{prefix}<gray>Opuściłeś tryb edycji."
  editor-clear-locations: "{prefix}<gray>Wyczyściłeś pozycje zrzutów w edytorze."
  editor-clear-failure: "{prefix}<gray>Musisz być edytorze, aby zmieniać pozycje zrzutów."
  kicked-from-editor-mode: "{prefix}<red>Wydarzenie zrzutów jest aktywne. Zatrzymaj je lub poczekaj do jego."
  add-location: "{prefix}<gray>Dodałeś lokację zrzutu."
  remove-location: "{prefix}<red>Usunąłeś lokację zrzutu."
  time-left: "{prefix}<gray>Aktualne wydarzenie będzie trwało jescze przez <gold>{time}<gray>."
  time-till-event: "{prefix}<gray>Następne wydarzenie zrzutów odbędzie za <gold>{time}<gray>."
  flare:
    used-flare: "{prefix}<gray>Rozpocząłeś wydarzenie zrzutów za pomocą flary."
    cant-use-flares: "{prefix}<red>Nie masz uprawnień do korzystania z flary."
    sent-flare: "{prefix}<gray>Flary przekazane graczowi <gold>{player} <gray>w ilości {amount}."
    received-flare: "{prefix}<gray>Dostałeś flary w ilości <gold>{amount}<gray>."
  new-center: "{prefix}<gray>Ustawiłeś nowe centrum zrzutów."
  not-in-world-guard-region: "{prefix}<red>Musisz być w strefie wojny aby używać flar."
  start-ignoring-messages: "{prefix}<gray>Od teraz wiadomośći zbiorowe nie będą ci wyświetlane."
  stop-ignoring-messages: "{prefix}<gray>Od teraz będziesz widział wiadomości zbiorowe."
  cooldown-left: "{prefix}<gray>Musisz odczekać jeszcze <gold>{time} <gray>zanim otworzysz kolejne zrzuty."
  countdown-in-progress: "{prefix}<gray>Nie możesz otwierać rzutów prezez następne <gold>{time}s."
  drops-available: "{prefix}<gray>Lista wszystkich zrzutów."
  drops-possibilities: "{prefix}<gray>Lista lokacji na które mogą spadać zrzuty."
  drops-page: "{prefix}<gray>Użyj /crazyenvoys drop [strona], aby zobaczyć więcej."
  drops-format: "<gray>[<gold>{id}<gray>]: {world}, {x}, {y}, {z}"
  no-spawn-locations-found: "{prefix}<red>Żadne pozycje zrzutów nie zostały znalezione, więc wydarzenie zostało zakończone, a opóźnienie zresetowane."
  hologram-placeholders:
    on-going: W trakcie
    not-running: Brak akcji
  time-placeholders:
    day: d
    hour: g
    minute: m
    second: s
  envoy-locations: '<yellow><b>Pozycje zrzutów: \n<red>[ID], [Świat]: [X], [Y], [Z] <reset>{locations}'
  location-format: '\n<dark_gray>[<dark_aqua>{id}<dark_gray>] <red>{world}: {x}, {y}, {z}'
misc:
  command-not-found: '{prefix}<red>Prawidłowe użycie tej komendy to <yellow>{usage}.'
  must-be-console-sender: '{prefix}<red>Musisz korzystać z konsoli, aby użyć tej komendy.'
  player-only: "{prefix}<red>Tylko gracze mogą używać tej komendy."
  not-online: "{prefix}<red>Ten gracz nie jest aktywny w tym momencie."
  not-a-number: "{prefix}<red>To nie jest liczba."
  config-reload: "{prefix}<gray>Przeładowałeś wszystkie pliki."
  help:
    - "<gold>/crazyenvoys help <gray>- Pokazuje te informacje."
    - "<gold>/crazyenvoys reload <gray>- Przeładowuje wszystkie pliki związane z ustawieniami pluginu."
    - "<gold>/crazyenvoys time <gray>- Pokazuje czas do startu lub końca wydarzenia zrzutów."
    - "<gold>/crazyenvoys drops [page] <gray>- Pokazuje wszystkie aktualne pozycje."
    - "<gold>/crazyenvoys ignore <gray>- Włącza ingorowanie wiadomości zbiorowych."
    - "<gold>/crazyenvoys flare [ilość] [gracz] <gray>- Daje graczowi flary pozwalające rozpocząć event."
    - "<gold>/crazyenvoys edit <gray>- Edytuj pozycje zrzutów za pomocą bedrock'a."
    - "<gold>/crazyenvoys start <gray>- Zmusza do rozpoczęcia zrzutu."
    - "<gold>/crazyenvoys stop <gray>- Zmusza do zakończenia zrzutu."
    - "<gold>/crazyenvoys center <gray>- Ustawia centrum losowego zrzutu."