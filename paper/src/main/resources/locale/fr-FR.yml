# Support: https://discord.gg/badbones-s-live-chat-182615261403283459
# Github: https://github.com/Crazy-Crew
#
# Issues: https://github.com/Crazy-Crew/CrazyEnvoys/issues
# Features: https://github.com/Crazy-Crew/CrazyEnvoys/issues
#
# Conseils:
#  1. Assure-toi d'utiliser le {prefix} pour ajouter le préfixe devant les messages.
#  2. Si tu souhaites utiliser plus d'une ligne pour un message, passe d'une ligne à une liste.
# Exemples:
#   Ligne:
#     No-Permission: '{prefix}<red>Tu n'as pas la permission d'utiliser cette commande.'
#   Liste:
#     No-Permission:
#       - '{prefix}<red>Tu n'as pas la permission'
#       - '<red>d'utiliser cette commande. Essaie une autre.'
player:
  no-permission: "{prefix}<gray>Tu n'as pas la permission d'utiliser cette commande."
  no-permission-to-claim: "{prefix}<gray>Tu n'as pas la permission de récupérer ce largage."
envoys:
  already-started: "{prefix}<gray>Un événement de largage est déjà en cours. Arrête-le pour en démarrer un nouveau."
  force-start: "{prefix}<gray>Tu viens de démarrer un largage."
  not-started: "{prefix}<gray>Il n'y a pas d'événement de largage en cours pour le moment."
  force-ended: "{prefix}<gray>Tu viens de mettre fin au largage."
  warning: "{prefix}<gray>Un événement de largage aura lieu dans <white>{time}<gray>."
  started:
    list:
      - "{prefix}<gray>Un événement de largage vient de commencer. <gold>{amount} <gray>caisses sont apparu autour du spawn pendant 5m."
  left: "{prefix}<white>{player} <gray>vient de trouver un largage. Il en reste maintenant <white>{amount} <gray>à trouver."
  ended: "{prefix}<gray>L'événement de largage est terminé. Merci d'avoir participé et reviens pour le prochain."
  not-enough-players: "{prefix}<gray>Il n'y a pas assez de joueurs en ligne pour démarrer l'événement de largage. Seulement <white>{amount} <gray>joueurs sont en ligne."
  enter-editor-mode: "{prefix}<gray>Tu es maintenant en mode éditeur."
  leave-editor-mode: "{prefix}<gray>Tu as quitté le mode éditeur."
  editor-clear-locations: "{prefix}<gray>Tu as effacé tous les emplacements d'apparition de l'éditeur."
  editor-clear-failure: "{prefix}<gray>Tu dois être en mode Éditeur pour effacer les emplacements d'apparition."
  kicked-from-editor-mode: "{prefix}<gray>Désolé mais un largage est actif. Arrête-le ou attends qu'il se termine."
  add-location: "{prefix}<gray>Tu viens d'ajouter un emplacement d'apparition."
  remove-location: "{prefix}<gray>Tu viens de supprimer un emplacement d'apparition."
  time-left: "{prefix}<gray>Le largage actuel se termine dans <white>{time}<gray>."
  time-till-event: "{prefix}<gray>Le prochain largage commencera dans <white>{time}<gray>."
  flare:
    used-flare: "{prefix}<gray>Tu viens de démarrer un événement de largage avec une fusée éclairante."
    cant-use-flares: "{prefix}<gray>Tu n'as pas la permission d'utiliser des fusées éclairantes."
    sent-flare: "{prefix}<gray>Tu viens de donner <white>{amount} <gray>fusées éclairantes à <white>{player}."
    received-flare: "{prefix}<gray>Tu as reçu <white>{amount} <gray>fusées éclairantes."
  new-center: "{prefix}<gray>Tu viens de définir un nouveau centre pour les caisses de largage aléatoires."
  not-in-world-guard-region: "{prefix}<gray>Tu dois être dans la Zone de Guerre pour utiliser une fusée éclairante."
  start-ignoring-messages: "{prefix}<gray>Tu ignores maintenant les messages de collecte."
  stop-ignoring-messages: "{prefix}<gray>Tu vois maintenant tous les messages de collecte."
  cooldown-left: "{prefix}<gray>Tu dois encore attendre <white>{time} <gray>avant de pouvoir collecter une autre caisse."
  countdown-in-progress: "{prefix}<gray>Tu ne peux pas récupérer de largages pendant encore <gold>{time} secondes."
  drops-available: "{prefix}<gray>Liste de tous les largages disponibles."
  drops-possibilities: "{prefix}<gray>Liste des emplacements où les largages peuvent apparaître."
  drops-page: "{prefix}<gray>Utilise /envoy drops [page] pour en voir plus."
  drops-format: "<gray>[<gold>{id}<gray>]: {world}, {x}, {y}, {z}"
  no-spawn-locations-found: "{prefix}<gray>Aucun emplacement d'apparition n'a été trouvé, l'événement a donc été annulé et le temps de recharge a été réinitialisé."
  hologram-placeholders:
    on-going: En cours
    not-running: En préparation
  time-placeholders:
    day: j
    hour: h
    minute: m
    second: s
  envoy-locations: "<yellow><b>Tous les emplacements de largage : \n<red>[ID], [Monde]: [X], [Y], [Z] <reset>{locations}"
  location-format: "<dark_gray>[<dark_aqua>{id}<dark_gray>] <red>{world}: {x}, {y}, {z}"
misc:
  command-not-found: '{prefix}<red>L''utilisation correcte de cette commande est <yellow>{usage}.'
  must-be-console-sender: '{prefix}<red>Vous devez utiliser la console pour exécuter cette commande.'
  player-only: "{prefix}<gray>Seuls les joueurs peuvent utiliser cette commande."
  not-online: "{prefix}<gray>Ce joueur n'est pas en ligne pour le moment."
  not-a-number: "{prefix}<gray>Ce n'est pas un nombre."
  config-reload: "{prefix}<gray>Tu viens de recharger tous les fichiers."
  help:
    - "<white>/envoy help <gray>- Affiche le menu d'aide des largages."
    - "<white>/envoy reload <gray>- Recharge tous les fichiers de configuration."
    - "<white>/envoy time <gray>- Affiche le temps avant le début ou la fin du largage."
    - "<white>/envoy drops [page] <gray>- Affiche tous les emplacements actuels des caisses."
    - "<white>/envoy ignore <gray>- Désactive le message de collecte de largage."
    - "<white>/envoy flare [quantité] [joueur] <gray>- Donne à un joueur une fusée éclairante pour appeler un événement de largage."
    - "<white>/envoy edit <gray>- Modifie les emplacements des caisses avec de la bedrock."
    - "<white>/envoy start <gray>- Force le démarrage du largage."
    - "<white>/envoy stop <gray>- Force l'arrêt du largage."
    - "<white>/envoy center <gray>- Définit le centre des largages de caisses aléatoires."